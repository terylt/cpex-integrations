# LiteLLM Proxy Configuration with CMF Policy Handler
#
# Usage:
#   cd mcp-context-forge
#   source .venv/bin/activate
#   set -a && source .env && set +a
#   litellm --config integrations/litellm/proxy_config.yaml
#
# Test with:
#   curl http://localhost:4000/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model": "watsonx", "messages": [{"role": "user", "content": "Hello"}]}'

# Model configuration
model_list:
  - model_name: watsonx
    litellm_params:
      model: watsonx/ibm/granite-8b-code-instruct
      # WatsonX credentials from environment variables:
      # WATSONX_APIKEY, WATSONX_URL, WATSONX_PROJECT_ID

  - model_name: gpt-4
    litellm_params:
      model: gpt-4
      # OpenAI credentials from environment: OPENAI_API_KEY

  - model_name: claude
    litellm_params:
      model: claude-3-haiku-20240307
      # Anthropic credentials from environment: ANTHROPIC_API_KEY

# LiteLLM settings
litellm_settings:
  # Enable our CMF policy handler
  #callbacks: integrations.litellm.proxy_callbacks.cmf_handler

  # Logging
  set_verbose: true
  json_logs: false

guardrails:
  # Pre-call disabled temporarily for post-call testing
  - guardrail_name: "cmf-policy-pre"
    litellm_params:
      guardrail: cmf_guardrail.CMFGuardrail
      mode: "pre_call"
      default_on: true
  - guardrail_name: "cmf-policy-post"
    litellm_params:
      guardrail: cmf_guardrail.CMFGuardrail
      mode: "post_call"
      default_on: true

# General settings
# Note: master_key requires a database connection for key validation.
# For local testing without a DB, omit master_key or use LITELLM_MASTER_KEY env var.
# general_settings:
#   master_key: sk-cmf-proxy-test-key  # Change in production!

# Router settings (optional)
router_settings:
  routing_strategy: simple-shuffle
